name: CI - Model Training (Advanced MLOps)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow[extras]
          pip install dagshub pandas numpy scikit-learn matplotlib joblib

      # Clean Previous MLflow Runs
      - name: Clean old MLflow runs
        run: |
          rm -rf MLProject/mlruns || true

      # Run MLflow Project
      - name: Run MLflow Project
        env:
          MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          mlflow run MLProject/ --env-manager=local

      # Get Run ID from run_id.txt
      - name: Get Run ID
        run: |
          RUN_ID=$(cat MLProject/run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      # Upload Model Metadata
      - name: Upload MLflow Metadata
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-metadata
          path: |
            mlflow.db
            MLProject/run_id.txt

      # Upload Confusion Matrix
      - name: Upload Confusion Matrix
        uses: actions/upload-artifact@v4
        with:
          name: confusion-matrix-artifact
          path: |
            MLProject/confusion_matrix.png

      # Upload Feature Importance
      - name: Upload Feature Importance
        uses: actions/upload-artifact@v4
        with:
          name: feature-importance-artifact
          path: |
            MLProject/feature_importance.png

      # Upload MLruns Folder
      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build Docker Image from MLflow Model
      - name: Build Docker Image
        env:
          MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
        run: |
          mlflow models build-docker \
            --model-uri "runs:/${{ env.RUN_ID }}/model" \
            --name ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag \
            ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction \
            ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest

      # Pipeline Finished
      - name: Completed
        run: |
          echo "Pipeline complete!"
          echo "Docker image pushed:"
          echo "${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest"
