name: CI - Model Training

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "MLProject/**"

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow dagshub pandas numpy scikit-learn matplotlib joblib

      - name: Run MLflow Project
        run: mlflow run MLProject/ --env-manager=local

      - name: Get Run ID
        run: echo "RUN_ID=$(cat MLProject/run_id.txt)" >> $GITHUB_ENV

      - name: Upload model artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            mlruns/
            MLProject/run_id.txt
            MLProject/confusion_matrix.png
            MLProject/feature_importance.png

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image (mlflow build-docker)
        run: |
          mlflow models build-docker \
            --model-uri "runs:/${{ env.RUN_ID }}/model" \
            --name ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction

      - name: Push to Docker Hub
        run: |
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction \
                     ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest
          echo "Docker image pushed: ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest"
