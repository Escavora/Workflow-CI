name: CI - Model Training (Advanced MLOps)

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "MLProject/**"
      - ".github/workflows/**"

jobs:
  train-and-deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Python
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow[extras]
          pip install dagshub pandas numpy scikit-learn matplotlib joblib

      # Clean Previous MLflow Runs
      - name: Clean old MLflow runs
        run: |
          rm -rf MLProject/mlruns || true

      # Run MLflow Project
      - name: Run MLflow Project
        env:
          MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
          MLFLOW_ALLOW_FILE_STORE: "true"
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject/ --env-manager=local

      # Get Run ID
      - name: Get Run ID
        run: |
          RUN_ID=$(cat MLProject/run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      # Upload Metadata
      - name: Upload MLflow Metadata
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-metadata
          path: |
            mlflow.db
            MLProject/run_id.txt
            MLProject/dataset_train.csv
            MLProject/dataset_test.csv

      # Upload Confusion Matrix
      - name: Upload Confusion Matrix
        uses: actions/upload-artifact@v4
        with:
          name: confusion-matrix-artifact
          path: |
            MLProject/confusion_matrix_training.png
            MLProject/confusion_matrix_testing.png

      # Upload Feature Importance
      - name: Upload Feature Importance
        uses: actions/upload-artifact@v4
        with:
          name: feature-importance-artifact
          path: |
            MLProject/feature_importance.csv

      # Commit generated files back to repository
      - name: Commit Generated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add MLProject/confusion_matrix_training.png
          git add MLProject/confusion_matrix_testing.png
          git add MLProject/feature_importance.csv
          git add MLProject/dataset_train.csv
          git add MLProject/dataset_test.csv
          git add MLProject/run_id.txt

          git status

          git diff --cached --quiet || git commit -m "Auto-generate ML artifacts [skip ci]"

          git push

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        env:
          MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
        run: |
          mlflow models build-docker \
            --model-uri "runs:/${{ env.RUN_ID }}/model" \
            --name ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag \
            ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction \
            ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest

      # Completed
      - name: Completed
        run: |
          echo "Pipeline complete!"
          echo "Docker image pushed:"
          echo "${{ secrets.DOCKER_HUB_USERNAME }}/stroke-prediction:latest"
